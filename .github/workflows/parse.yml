name: Parse Obsidian Content

on:
  repository_dispatch:
    types: [obsidian-update]
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout events site
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone obsidian vault
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.VAULT_TOKEN }}@github.com/nm-obsidian/service.git .vault-cache

      - name: Run parser
        run: node parse.mjs --vault .vault-cache/events

      - name: Clean up vault cache
        run: rm -rf .vault-cache

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to staging
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B staging
          git commit -m "Update content from obsidian vault"
          git remote set-url origin https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/nm-static/events.git
          git push --force origin staging

      - name: Create Fizzy card
        if: steps.changes.outputs.changed == 'true'
        id: fizzy
        run: |
          STAGING_URL="https://staging--nm-events.netlify.app"
          HEADERS=$(mktemp)
          curl -s -D "$HEADERS" -X POST \
            -H "Authorization: Bearer ${{ secrets.FIZZY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"card\": {\"title\": \"Events site update — review staging\", \"description\": \"<p>New content pushed from obsidian vault.</p><p><a href='${STAGING_URL}'>Preview on staging</a></p>\"}}" \
            "https://fizzy.neeldhara.cloud/7/boards/03fpaqw83uniura72xoqywg0w/cards"

          # Extract card path from Location header (e.g. /7/cards/5.json)
          LOCATION=$(grep -i '^location:' "$HEADERS" | tr -d '\r' | awk '{print $2}')
          echo "Location header: $LOCATION"
          CARD_NUMBER=$(echo "$LOCATION" | grep -oE '/cards/[0-9]+' | grep -oE '[0-9]+')
          echo "Card number: $CARD_NUMBER"

          if [ -n "$CARD_NUMBER" ]; then
            CARD_URL="https://fizzy.neeldhara.cloud/7/cards/${CARD_NUMBER}"

            # Triage card into Under Review column
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.FIZZY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"column_id": "03fpaqx7659jlprlznse264lh"}' \
              "https://fizzy.neeldhara.cloud/7/cards/${CARD_NUMBER}/triage"
          else
            CARD_URL="https://fizzy.neeldhara.cloud/7/boards/03fpaqw83uniura72xoqywg0w"
          fi

          rm -f "$HEADERS"
          echo "card_url=${CARD_URL}" >> "$GITHUB_OUTPUT"
          echo "card_number=${CARD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Notify Mattermost
        if: steps.changes.outputs.changed == 'true'
        run: |
          STAGING_URL="https://staging--nm-events.netlify.app"
          CARD_URL="${{ steps.fizzy.outputs.card_url }}"
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"### Events site update ready for review\n\n:rocket: New content has been deployed to staging.\n\n:mag: **[Preview on staging](${STAGING_URL})**\n:clipboard: **[Review card on Fizzy](${CARD_URL})**\n\nClose the Fizzy card to publish to production.\"}" \
            "${{ secrets.MATTERMOST_WEBHOOK }}"
